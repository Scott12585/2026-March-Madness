<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>2026 March Madness - Round of 64</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: auto;
      background: #f5f5f5;
      text-align: center;
    }

    canvas {
      max-width: 100%;
      height: auto;
      margin-bottom: 20px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

  <div style="margin:20px;">
    <button onclick="loadPDF('2026 March Madness - Round of 64.pdf')">Round of 64</button>
    <button onclick="loadPDF('2026 March Madness - Round of 32.pdf')">Round of 32</button>
    <button onclick="loadPDF('2026 March Madness - Sweet Sixteen.pdf')">Sweet Sixteen</button>
    <button onclick="loadPDF('2026 March Madness - Elite Eight.pdf')">Elite Eight</button>
    <button onclick="loadPDF('2026 March Madness - Final Four.pdf')">Final Four</button>
  </div>

  <div id="pdf-container"></div>

  <script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    function loadPDF(fileName) {
      const container = document.getElementById("pdf-container");
      container.innerHTML = ""; // clear previous PDF

      const url = encodeURI(fileName);

      pdfjsLib.getDocument(url).promise.then(function (pdf) {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(function (page) {

            const scale = 7;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            container.appendChild(canvas);

            page.render({
              canvasContext: context,
              viewport: viewport
            });
          });
        }
      });
    }

    // Load default on page load
    loadPDF('March Madness 2026 - Round of 64.pdf');
  </script>

</body>
</html>
