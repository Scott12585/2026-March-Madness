<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- Allow zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sheet View</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sheet-container {
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    iframe {
      border: none;
      width: 100%;
      height: 150vh; /* Important: taller than screen */
      min-height: 1200px; /* Fallback for mobile */
    }
  </style>
</head>
<body>

<div class="sheet-container">
<iframe 
  src="https://docs.google.com/spreadsheets/d/11lGymWUKkBVr1UKjsdUNKSsMw2O9NGDpJVU6_6IaFHs/preview">
</iframe>
</div>  

</body>
</html>
