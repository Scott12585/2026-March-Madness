<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      text-align: center;
    }

    canvas {
      width: 100%;
      height: auto;
      max-width: 1200px;
    }

    .controls {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="controls">
  <button onclick="zoomOut()">−</button>
  <button onclick="zoomIn()">+</button>
</div>

<canvas id="pdf-render"></canvas>

<script>
  const url = "2026%20March%20Madness%20-%20Round%20of%2064.pdf";

  let pdfDoc = null,
      pageNum = 1,
      scale = 1.2,
      canvas = document.getElementById("pdf-render"),
      ctx = canvas.getContext("2d");

  pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
    pdfDoc = pdfDoc_;
    renderPage(pageNum);
  });

  function renderPage(num) {
    pdfDoc.getPage(num).then(function(page) {
      const viewport = page.getViewport({ scale: scale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      page.render(renderContext);
    });
  }

  function zoomIn() {
    scale += 0.2;
    renderPage(pageNum);
  }

  function zoomOut() {
    if (scale <= 0.4) return;
    scale -= 0.2;
    renderPage(pageNum);
  }
</script>

</body>
</html>
